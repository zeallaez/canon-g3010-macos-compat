name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts and documentation
        run: make check
      - name: Build compatibility package
        run: make package
      - uses: actions/upload-artifact@v4
        with:
          name: canon-g3010-macos-compat
          path: |
            dist/*.pkg
            dist/*.zip
            dist/SHA256SUMS
