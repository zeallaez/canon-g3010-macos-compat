name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native scanner build dependencies
        run: brew install sane-backends gnutls jpeg-turbo libpng libtiff
      - name: Build release artifacts
        run: make package
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/*.pkg \
              dist/*.zip \
              dist/SHA256SUMS \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/*.pkg \
              dist/*.zip \
              dist/SHA256SUMS \
              --generate-notes \
              --title "Canon G3010 macOS Compatibility ${GITHUB_REF_NAME}"
          fi
